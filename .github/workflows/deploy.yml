name: Build and Deploy PokeMMO

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── All build + deploy happens on the server itself ───────────────
      - name: Build and deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.225.100.71
          username: ray
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e

            # ── Pull latest source ──────────────────────────────────────
            sudo mkdir -p /var/www/pokemmo-build /var/www/pokemmo
            sudo chown -R ray:ray /var/www/pokemmo-build /var/www/pokemmo
            cd /var/www/pokemmo-build
            git pull origin master

            # ── Build client bundle (node:8 via Docker) ─────────────────
            docker build -f Dockerfile.client -t pokemmo-client-builder .
            docker rm -f pokemmo-tmp 2>/dev/null || true
            docker create --name pokemmo-tmp pokemmo-client-builder
            docker cp pokemmo-tmp:/app/bundle.js /var/www/pokemmo/bundle.js
            docker cp pokemmo-tmp:/app/index.html /var/www/pokemmo/index.html
            docker cp pokemmo-tmp:/app/main.css   /var/www/pokemmo/main.css
            docker cp pokemmo-tmp:/app/assets      /var/www/pokemmo/
            docker cp pokemmo-tmp:/app/worlds      /var/www/pokemmo/
            docker rm pokemmo-tmp

            # ── Build WS server image + restart container ───────────────
            docker build -f Dockerfile.server -t pokemmo-server .
            docker rm -f pokemmo-ws 2>/dev/null || true
            docker run -d \
              --name pokemmo-ws \
              --restart unless-stopped \
              -p 127.0.0.1:3002:3002 \
              pokemmo-server

            # ── Configure Nginx (once) ──────────────────────────────────
            NGINX_CONF="/etc/nginx/sites-enabled/hello-web"
            if ! sudo grep -q "location /pokemmo/" "$NGINX_CONF"; then
              sudo tee /etc/nginx/snippets/pokemmo.conf > /dev/null << 'NGINXEOF'
            # ── Internal auth check endpoint ──────────────────────────
            location = /auth-check {
                internal;
                proxy_pass              http://127.0.0.1:3001/api/auth/me;
                proxy_pass_request_body off;
                proxy_set_header        Content-Length "";
                proxy_set_header        X-Original-URI $request_uri;
                proxy_set_header        Cookie $http_cookie;
            }

            # ── PokeMMO static client files (auth-gated) ──────────────
            location /pokemmo/ {
                auth_request /auth-check;
                error_page 401 = @pokemmo_login_redirect;
                alias /var/www/pokemmo/;
                try_files $uri $uri/ /pokemmo/index.html;
            }

            location @pokemmo_login_redirect {
                return 302 /login?redirect=/projects/pokemon;
            }

            # ── PokeMMO WebSocket proxy ────────────────────────────────
            location /pokemmo-ws {
                proxy_pass          http://127.0.0.1:3002;
                proxy_http_version  1.1;
                proxy_set_header    Upgrade $http_upgrade;
                proxy_set_header    Connection "Upgrade";
                proxy_set_header    Host $host;
                proxy_read_timeout  3600s;
            }
            NGINXEOF
              sudo sed -i '/^    listen 443 ssl;/i \    include /etc/nginx/snippets/pokemmo.conf;\n' "$NGINX_CONF"
            fi
            sudo nginx -t && sudo systemctl reload nginx

